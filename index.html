<html lang="es">
<head>

<title>Un poco de nosotros ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #d4a843; --gold-light: #f0cc70;
  --navy: #0e0b14; --burgundy: #5a1020;
  --cinna-blue: #a8d8f0; --cinna-pink: #f5c2cb; --cinna-lav: #d4b8f0;
  --cream: #faf4e6; --warm: #f0e4c8;
  --ink: #2d1f0e; --ink-light: #7a5c30;
  --map-ink: rgba(180,140,60,0.18);
}
body {
  background: #090610;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Quicksand', sans-serif;
  overflow: hidden;
}

/* ═══ MARAUDER MAP BG ═══ */
.map-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  overflow: hidden;
}
.map-bg svg { width: 100%; height: 100%; }
.footstep {
  position: fixed;
  width: 5px; height: 3px; border-radius: 50%;
  background: rgba(180,140,60,0.5);
  pointer-events: none; z-index: 1;
  animation: walkFade var(--dur,6s) ease-in-out infinite var(--del,0s);
}
@keyframes walkFade {
  0%   { opacity:0; transform:translate(0,0) scale(0.5); }
  15%  { opacity:0.9; transform:translate(0,0) scale(1); }
  85%  { opacity:0.6; transform:translate(var(--tx,40px),var(--ty,20px)) scale(1); }
  100% { opacity:0; transform:translate(var(--tx,40px),var(--ty,20px)) scale(0.5); }
}

/* ═══ PARTICLES ═══ */
.particles { position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
.particle {
  position:absolute;
  animation: floatUp var(--dur,9s) ease-in-out infinite var(--del,0s);
  font-size:var(--sz,14px); opacity:0;
}
@keyframes floatUp {
  0%   { transform:translateY(105vh) rotate(0deg); opacity:0; }
  8%   { opacity:.7; }
  92%  { opacity:.5; }
  100% { transform:translateY(-5vh) rotate(360deg); opacity:0; }
}

/* ═══ SCENE ═══ */
.scene {
  position:relative; z-index:2;
  display:flex; flex-direction:column; align-items:center; gap:18px;
}

/* ═══ BOOK ═══ */
.book-wrap { position:relative; }
.book {
  width:900px; height:580px;
  position:relative;
  filter: drop-shadow(0 30px 70px rgba(0,0,0,.85))
          drop-shadow(0 0 40px rgba(168,90,30,.15));
}

/* ═══ SPREAD ═══ */
.spread {
  position:absolute; inset:0;
  display:flex;
  border-radius:3px 10px 10px 3px;
  overflow:hidden;
  transition: none;
}
/* Page flip 3D */
.book-wrap { perspective: 2800px; }
.flip-page {
  position: absolute; top: 0; width: 50%; height: 100%;
  z-index: 40; transform-style: preserve-3d;
  animation-fill-mode: forwards;
  animation-timing-function: cubic-bezier(.33,.07,.4,.97);
  animation-duration: .95s;
  pointer-events: none;
}
.flip-face {
  position: absolute; inset: 0; backface-visibility: hidden;
  background: var(--cream);
  background-image: repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(160,130,80,.07) 27px,rgba(160,130,80,.07) 28px);
}
.flip-page.fwd {
  right: 0; transform-origin: left center;
  animation-name: flipFwd;
}
.flip-page.back {
  left: 0; transform-origin: right center;
  animation-name: flipBack;
}
.flip-face.front-fwd { box-shadow: inset -20px 0 30px -20px rgba(0,0,0,.25); }
.flip-face.back-fwd { transform: rotateY(180deg); box-shadow: inset 20px 0 30px -20px rgba(0,0,0,.25); }
.flip-face.front-back { box-shadow: inset 20px 0 30px -20px rgba(0,0,0,.25); }
.flip-face.back-back { transform: rotateY(-180deg); box-shadow: inset -20px 0 30px -20px rgba(0,0,0,.25); }

@keyframes flipFwd {
  0%   { transform: rotateY(0); box-shadow: 0 0 0 rgba(0,0,0,0); }
  40%  { box-shadow: -30px 10px 50px rgba(0,0,0,.35); }
  100% { transform: rotateY(-180deg); box-shadow: -15px 10px 30px rgba(0,0,0,.15); }
}
@keyframes flipBack {
  0%   { transform: rotateY(0); box-shadow: 0 0 0 rgba(0,0,0,0); }
  40%  { box-shadow: 30px 10px 50px rgba(0,0,0,.35); }
  100% { transform: rotateY(180deg); box-shadow: 15px 10px 30px rgba(0,0,0,.15); }
}

/* Spine */
.book::after {
  content:''; position:absolute; left:50%; top:0; bottom:0;
  width:18px; transform:translateX(-50%);
  background:linear-gradient(to right,#1a0408,#3d0e18,#55182a,#3d0e18,#1a0408);
  z-index:20; box-shadow:0 0 12px rgba(0,0,0,.7);
}

/* ═══ PAGES ═══ */
.page {
  flex:1; position:relative; overflow:hidden;
  background:var(--cream);
}
.page::before { /* line texture */
  content:''; position:absolute; inset:0; z-index:1; pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(160,130,80,.07) 27px,rgba(160,130,80,.07) 28px);
}
.page-left::after {
  content:''; position:absolute; top:0; right:0; bottom:0; width:50px;
  background:linear-gradient(to left,rgba(0,0,0,.1),transparent);
  z-index:2; pointer-events:none;
}
.page-right::after {
  content:''; position:absolute; top:0; left:0; bottom:0; width:50px;
  background:linear-gradient(to right,rgba(0,0,0,.08),transparent);
  z-index:2; pointer-events:none;
}

/* ═══ COVER ═══ */
.cover-left {
  background:linear-gradient(145deg,#0a0d1e 0%,#111830 100%);
  display:flex; align-items:center; justify-content:center;
  padding:24px;
}
.cover-right {
  background:linear-gradient(145deg,var(--burgundy) 0%,#3a0818 55%,#0d0820 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:36px; position:relative; overflow:hidden;
}
.cover-border {
  position:absolute; inset:14px;
  border:1.5px solid rgba(212,168,67,.45); border-radius:3px; pointer-events:none;
}
.cover-border::before {
  content:''; position:absolute; inset:6px;
  border:1px solid rgba(212,168,67,.25); border-radius:2px;
}
.cover-title {
  font-family:'Cinzel',serif; color:var(--gold-light);
  font-size:26px; text-align:center; line-height:1.4;
  text-shadow:0 0 24px rgba(212,168,67,.55);
  position:relative; z-index:2;
}
.cover-names {
  font-family:'Cinzel',serif; color:var(--cinna-pink);
  font-size:17px; margin-top:14px;
  text-shadow:0 0 14px rgba(245,194,203,.5);
  position:relative; z-index:2;
}
.cover-date {
  font-family:'Quicksand',sans-serif; color:rgba(212,168,67,.65);
  font-size:12px; margin-top:10px; letter-spacing:2px;
  position:relative; z-index:2;
}
.cover-divider {
  width:56px; height:1.5px; margin:14px auto;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  position:relative; z-index:2;
}

/* Days counter pill */
.days-pill {
  background:rgba(8,4,18,.88);
  border:1.5px solid rgba(212,168,67,.5);
  border-top: none;
  border-radius:0 0 20px 20px;
  padding:8px 22px 10px;
  display:flex; flex-direction:column; align-items:center;
  backdrop-filter:blur(10px);
  box-shadow:0 4px 24px rgba(0,0,0,.7), 0 0 20px rgba(212,168,67,.1);
}
.days-num {
  font-family:'Cinzel',serif; font-size:26px;
  color:var(--cinna-blue); line-height:1;
  text-shadow: 0 0 12px rgba(168,216,240,.6);
}
.days-label {
  font-size:9px; color:rgba(168,216,240,.65);
  letter-spacing:2px; text-transform:uppercase; margin-top:3px;
}

/* ═══ PHOTO AREA ═══ */
.photo-area {
  position:relative; z-index:3;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  width:100%; height:100%; padding:24px 22px 44px; gap:12px;
}
.photo-frame {
  position:relative; flex:1; width:100%; max-height:calc(100% - 52px);
  border-radius:3px; overflow:hidden; cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.2),inset 0 0 0 3px rgba(212,168,67,.28),inset 0 0 0 4px rgba(255,255,255,.55);
  transition:transform .2s,box-shadow .2s;
}
.photo-frame:hover { transform:scale(1.015); box-shadow:0 4px 18px rgba(0,0,0,.3),inset 0 0 0 3px rgba(212,168,67,.5),inset 0 0 0 4px rgba(255,255,255,.8); }
.photo-frame img { width:100%; height:100%; object-fit:cover; display:block; }
.photo-placeholder {
  width:100%; height:100%;
  background:linear-gradient(135deg,var(--warm) 0%,#e0cfa0 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px; cursor:pointer; border:2px dashed rgba(180,140,60,.3);
  transition:background .2s;
}
.photo-placeholder:hover { background:linear-gradient(135deg,#e8d5a0,#d4bc80); }
.photo-placeholder-icon { font-size:28px; opacity:.4; }
.photo-placeholder-text { font-size:11px; color:var(--ink-light); opacity:.65; letter-spacing:1px; }

.caption-input {
  width:100%; background:transparent; border:none;
  border-bottom:1px solid rgba(212,168,67,.28);
  text-align:center; font-family:'Quicksand',sans-serif;
  font-size:11.5px; color:var(--ink); padding:4px 8px; outline:none;
  transition:border-color .2s;
}
.caption-input::placeholder { color:rgba(100,70,20,.32); font-style:italic; }
.caption-input:focus { border-bottom-color:var(--gold); }

.page-num {
  position:absolute; bottom:12px;
  font-family:'Cinzel',serif; font-size:10px; color:var(--ink-light); opacity:.5; z-index:10;
}
.page-left .page-num { left:18px; }
.page-right .page-num { right:18px; }

/* Cinna corner decoration */
.cinna-deco {
  position:absolute; pointer-events:none; z-index:5; opacity:.55;
}

/* ═══ HIDDEN MESSAGE OVERLAY ═══ */
.msg-overlay {
  position:fixed; inset:0; z-index:100;
  background:rgba(8,5,18,.82); backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center;
  animation:fadeIn .3s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.msg-box {
  background:linear-gradient(145deg,#1a0a2e,#2a1040);
  border:1.5px solid rgba(212,168,67,.4); border-radius:16px;
  padding:40px; width:420px; max-width:90vw;
  display:flex; flex-direction:column; align-items:center; gap:16px;
  position:relative;
  box-shadow:0 0 60px rgba(168,70,200,.2);
  animation:popIn .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
.msg-sparkle {
  font-size:32px; animation:spin 3s linear infinite;
}
@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
.msg-title {
  font-family:'Cinzel',serif; color:var(--gold-light); font-size:15px; letter-spacing:2px;
  text-align:center;
}
.msg-textarea {
  width:100%; min-height:90px; background:rgba(255,255,255,.06);
  border:1px solid rgba(212,168,67,.25); border-radius:10px;
  color:white; font-family:'Quicksand',sans-serif; font-size:14px;
  padding:12px 16px; outline:none; resize:none; line-height:1.6;
  transition:border-color .2s;
}
.msg-textarea::placeholder { color:rgba(255,255,255,.25); font-style:italic; }
.msg-textarea:focus { border-color:rgba(212,168,67,.5); }
.msg-close {
  background:linear-gradient(135deg,rgba(168,216,240,.2),rgba(245,194,203,.2));
  border:1px solid rgba(168,216,240,.35); border-radius:30px;
  color:var(--cinna-blue); padding:9px 28px; cursor:pointer;
  font-family:'Quicksand',sans-serif; font-size:13px; font-weight:600; letter-spacing:1px;
  transition:all .2s;
}
.msg-close:hover { background:linear-gradient(135deg,rgba(168,216,240,.35),rgba(245,194,203,.35)); transform:translateY(-1px); }
.msg-hint { font-size:11px; color:rgba(168,216,240,.45); letter-spacing:1px; }

/* ═══ NAV ═══ */
.nav-bar {
  display:flex; align-items:center; gap:20px; z-index:10; position:relative;
}
.nav-btn {
  background:rgba(212,168,67,.12); border:1px solid rgba(212,168,67,.3);
  color:var(--gold-light); width:42px; height:42px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:20px; transition:all .2s; backdrop-filter:blur(4px);
}
.nav-btn:hover:not(:disabled) { background:rgba(212,168,67,.28); border-color:var(--gold); transform:scale(1.1); }
.nav-btn:disabled { opacity:.22; cursor:default; }
.page-indicator {
  font-family:'Cinzel',serif; font-size:12px;
  color:rgba(212,168,67,.65); letter-spacing:2px;
}
.upload-btn {
  background:linear-gradient(135deg,rgba(168,216,240,.15),rgba(245,194,203,.15));
  border:1px solid rgba(168,216,240,.35); border-radius:30px;
  color:var(--cinna-blue); padding:9px 20px; cursor:pointer;
  font-family:'Quicksand',sans-serif; font-size:13px; font-weight:600; letter-spacing:.5px;
  display:flex; align-items:center; gap:7px; transition:all .2s;
}
.upload-btn:hover { background:linear-gradient(135deg,rgba(168,216,240,.28),rgba(245,194,203,.28)); transform:translateY(-1px); }

/* ═══ TWEAKS ═══ */
.tweaks-panel {
  position:fixed; bottom:20px; right:20px; width:260px;
  background:rgba(12,8,22,.96); border:1px solid rgba(212,168,67,.28);
  border-radius:14px; padding:20px; z-index:200; backdrop-filter:blur(14px);
  display:none; flex-direction:column; gap:14px;
}
.tweaks-panel.open { display:flex; }
.tweaks-title { font-family:'Cinzel',serif; color:var(--gold); font-size:13px; letter-spacing:2px; border-bottom:1px solid rgba(212,168,67,.18); padding-bottom:10px; }
.tweak-row { display:flex; flex-direction:column; gap:4px; }
.tweak-lbl { font-size:10px; color:rgba(255,255,255,.45); letter-spacing:1px; text-transform:uppercase; }
.tweak-inp {
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1);
  border-radius:7px; color:white; padding:6px 10px;
  font-family:'Quicksand',sans-serif; font-size:13px; width:100%; outline:none;
}
.tweak-inp:focus { border-color:rgba(212,168,67,.4); }
.tweak-btn-row { display:flex; gap:8px; }
.tweak-btn {
  flex:1; padding:7px; border-radius:7px; cursor:pointer;
  font-family:'Quicksand',sans-serif; font-size:12px; border:none;
  transition:all .2s;
}
.tweak-btn.add { background:rgba(168,216,240,.12); border:1px solid rgba(168,216,240,.2); color:#a8d8f0; }
.tweak-btn.remove { background:rgba(255,100,100,.1); border:1px solid rgba(255,100,100,.2); color:#ff9999; }
.tweak-btn:hover { filter:brightness(1.3); }

/* ═══ LAST PAGE ═══ */
.last-page {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; padding:36px; gap:16px;
}
.last-page-title {
  font-family:'Cinzel',serif; color:var(--ink-light); font-size:14px;
  text-align:center; opacity:.65;
}
.add-page-btn {
  padding:8px 22px; background:rgba(168,216,240,.1);
  border:1px solid rgba(168,216,240,.28); border-radius:20px;
  cursor:pointer; font-family:'Quicksand',sans-serif;
  font-size:12px; color:#a8d8f0; letter-spacing:.5px; transition:all .2s;
}
.add-page-btn:hover { background:rgba(168,216,240,.22); }
</style>
</head>

        {/* Decorative dots along corridors */}
        {Array.from({ length: 30 }, (_, i) => ({
          cx: (i * 97 + 43) % 1280, cy: i % 2 === 0 ? 240 : 500,
          r: i % 3 === 0 ? 1.5 : 1
        })).map((d, i) =>
        <circle key={i} cx={d.cx} cy={d.cy} r={d.r} fill="rgba(180,140,60,.2)" />
        )}
        {/* Subtle vignette */}
        <radialGradient id="vig" cx="50%" cy="50%" r="70%">
          <stop offset="0%" stopColor="transparent" />
          <stop offset="100%" stopColor="rgba(5,3,12,.6)" />
        </radialGradient>
        <rect width="1280" height="800" fill="url(#vig)" />
      </svg>
    </div>
    {steps.map((s, i) =>
    <div key={i} className="footstep" style={{
      left: s.x, top: s.y,
      '--dur': s.dur + 's', '--del': s.del + 's',
      '--tx': s.tx + 'px', '--ty': s.ty + 'px'
    }} />
    )}
  </>;
}

// ─── Floating Particles ───
const EMOJIS = ['✦', '♡', '✨', '⚡', '🌙', '✦', '♡', '✦', '·'];
function Particles() {
  const items = Array.from({ length: 16 }, (_, i) => ({
    id: i, x: Math.random() * 100,
    e: EMOJIS[i % EMOJIS.length],
    dur: (Math.random() * 8 + 8).toFixed(1),
    del: (Math.random() * 12).toFixed(1),
    sz: (Math.random() * 8 + 10).toFixed(0)
  }));
  return (
    <div className="particles">
      {items.map((p) =>
      <div key={p.id} className="particle" style={{
        left: p.x + '%', '--dur': p.dur + 's', '--del': p.del + 's', '--sz': p.sz + 'px', fontSize: p.sz + 'px'
      }}>{p.e}</div>
      )}
    </div>);

}

// ─── Days Together Counter ───
function DaysCounter({ startDate }) {
  const [count, setCount] = useState(0);
  const [isFuture, setIsFuture] = useState(false);
  useEffect(() => {
    const start = new Date(startDate + 'T00:00:00');
    const now = new Date();
    const diff = Math.floor((now - start) / 86400000);
    if (diff < 0) {setIsFuture(true);setCount(Math.abs(diff));} else
    {setIsFuture(false);setCount(diff);}
  }, [startDate]);
  return (
    <div className="days-pill" style={{ width: "120.391px", height: "39px" }}>
      <div className="days-num" style={{ height: "48px", width: "51px", letterSpacing: "-0.2px", fontWeight: "300", padding: "-20px 0px 0px" }}>{count}</div>
      <div className="days-label" style={{ textAlign: "center", padding: "0px", width: "93px", margin: "-8px 0px 0px" }}>{isFuture ? 'días para ✦' : 'días juntos'}</div>
    </div>);

}

        <div key={i} style={{

          fontSize: 18,
          animation: `floatY${i % 2} 2s ease-in-out infinite`,

        }}>{s}</div>
        )}

        <textarea

}

          <div style={{ fontFamily: "'Cinzel',serif", fontSize: 9, color: 'rgba(212,168,67,.5)', letterSpacing: 4, textTransform: 'uppercase' }}>

      </div>

      <div className="photo-area">
        <div className="photo-frame" onClick={onPhotoClick} style={{ position: 'relative' }}>
          {photo ?

              {/* Top-right action buttons */}

// ─── Last Page ───
function LastPage({ side, onAdd }) {

  return (
    <div className="page page-right">
      <div className="last-page">
        <CinnaDeco size={65} />
        <div className="last-page-title">Añade más<br />recuerdos mágicos ✨</div>
        <button className="add-page-btn" onClick={onAdd}>+ Agregar fotos</button>
      </div>
    </div>);

}

// ─── Main Album ───
function Album() {
  const saved = load();
  const [photos, setPhotos] = useState(saved.photos || [null, null]);
  const [captions, setCaptions] = useState(saved.captions || ['', '']);
  const [secrets, setSecrets] = useState(saved.secrets || {});
  const [spread, setSpread] = useState(saved.spread || 0);
  const [prevSpread, setPrevSpread] = useState(saved.spread || 0);
  const [dir, setDir] = useState('right'); // slide direction
  const [animKey, setAnimKey] = useState(0);
  const [transitioning, setTransitioning] = useState(false);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [msgSlot, setMsgSlot] = useState(null); // photo index for message overlay

  const [title, setTitle] = useState(saved.title || DEFAULTS.albumTitle);
  const [names, setNames] = useState(saved.names || DEFAULTS.coupleNames);
  const [date, setDate] = useState(saved.date || DEFAULTS.specialDate);
  const [startD, setStartD] = useState(saved.startD || DEFAULTS.startDate);

  const fileRef = useRef(null);
  const pendingSlot = useRef(null);

  const totalSpreads = Math.ceil(photos.length / 2) + 1; // +1 for cover

  useEffect(() => {
    save({ photos, captions, secrets, spread, title, names, date, startD });
  }, [photos, captions, secrets, spread, title, names, date, startD]);

  // Tweaks protocol
  useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  const navigate = useCallback((delta) => {
    if (transitioning) return;
    const next = spread + delta;
    if (next < 0 || next >= totalSpreads) return;
    setDir(delta > 0 ? 'right' : 'left');
    setPrevSpread(spread);
    setTransitioning(true);
    setAnimKey((k) => k + 1);
    // Swap underlying spread at the midpoint (flip edge-on, invisible)
    setTimeout(() => {setSpread(next);}, 475);
    setTimeout(() => {setTransitioning(false);}, 950);
  }, [spread, totalSpreads, transitioning]);

  useEffect(() => {
    const h = (e) => {
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'ArrowLeft') navigate(-1);
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [navigate]);

  const openPhoto = (slot) => {pendingSlot.current = slot;fileRef.current.click();};
  const openBulk = () => {pendingSlot.current = null;fileRef.current.click();};

  const handleFiles = (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    const slot = pendingSlot.current;

    const readFile = (f) => new Promise((res) => {
      const r = new FileReader();
      r.onload = (ev) => res(ev.target.result);
      r.readAsDataURL(f);
    });

    if (slot !== null && files.length === 1) {
      readFile(files[0]).then((data) => {
        setPhotos((p) => {const n = [...p];n[slot] = data;return n;});
      });
    } else {
      // Fill empty slots then append
      Promise.all(files.map(readFile)).then((datas) => {
        setPhotos((prev) => {
          const n = [...prev];
          let fi = 0;
          for (let i = 0; i < n.length && fi < datas.length; i++) {
            if (!n[i]) n[i] = datas[fi++];
          }
          while (fi < datas.length) {
            n.push(datas[fi++]);
            if (n.length % 2 !== 0) n.push(null);
          }
          return n;
        });
        setCaptions((prev) => {
          const n = [...prev];
          while (n.length < photos.length + files.length + 2) n.push('');
          return n;
        });
      });
    }
    pendingSlot.current = null;
    e.target.value = '';
  };

  const addPageSlots = () => {
    setPhotos((p) => [...p, null, null]);
    setCaptions((c) => [...c, '', '']);
  };

  // Render spread content
  const renderSpread = (si) => {
    if (si === 0) return (
      <CoverSpread title={title} names={names} date={date} startDate={startD} />);

    const pi = (si - 1) * 2; // left photo index
    const isLast = si === totalSpreads - 1;

    const left =
    <PhotoPage
      photo={photos[pi]} caption={captions[pi]}
      onPhotoClick={() => photos[pi] ? null : openPhoto(pi)}
      onCaptionChange={(v) => setCaptions((c) => {const n = [...c];n[pi] = v;return n;})}
      onSecretClick={() => setMsgSlot(pi)}
      onDelete={() => {
        setPhotos((p) => {const n = [...p];n[pi] = null;return n;});
        setCaptions((c) => {const n = [...c];n[pi] = '';return n;});
        setSecrets((s) => {const n = { ...s };delete n[pi];return n;});
      }}
      hasSecret={!!secrets[pi]}
      pageNum={pi + 1} side="left" />;



    const right = pi + 1 < photos.length ?
    isLast && !photos[pi + 1] ?
    <LastPage side="right" onAdd={() => {addPageSlots();setTimeout(() => openBulk(), 50);}} /> :

    <PhotoPage
      photo={photos[pi + 1]} caption={captions[pi + 1]}
      onPhotoClick={() => photos[pi + 1] ? null : openPhoto(pi + 1)}
      onCaptionChange={(v) => setCaptions((c) => {const n = [...c];n[pi + 1] = v;return n;})}
      onSecretClick={() => setMsgSlot(pi + 1)}
      onDelete={() => {
        const k = pi + 1;
        setPhotos((p) => {const n = [...p];n[k] = null;return n;});
        setCaptions((c) => {const n = [...c];n[k] = '';return n;});
        setSecrets((s) => {const n = { ...s };delete n[k];return n;});
      }}
      hasSecret={!!secrets[pi + 1]}
      pageNum={pi + 2} side="right" /> :



    <LastPage side="right" onAdd={() => {addPageSlots();setTimeout(() => openBulk(), 50);}} />;


    return <div className="spread">{left}{right}</div>;
  };

  const enterClass = dir === 'right' ? 'slide-enter-right' : 'slide-enter-left';

  return (
    <div className="scene">
      <MarauderMap />
      <Particles />

      <input ref={fileRef} type="file" accept="image/*" multiple style={{ display: 'none' }} onChange={handleFiles} />

      {/* Book */}
      <div className="book-wrap">
        <div className="book">
        {/* Days counter centered on spine */}
        <div style={{
            position: 'absolute', top: 0, left: '50%', transform: 'translateX(-50%)',
            zIndex: 40, display: 'flex', justifyContent: 'center'
          }}>
          <DaysCounter startDate={startD} />
        </div>
          <div className="spread" style={{ position: 'absolute', inset: 0, zIndex: 5 }}>
            {renderSpread(spread)}
          </div>
          {transitioning &&
          <div key={animKey} className={`flip-page ${dir === 'right' ? 'fwd' : 'back'}`}>
              <div className={`flip-face ${dir === 'right' ? 'front-fwd' : 'front-back'}`} style={{ overflow: 'hidden' }}>
                <div style={{ position: 'absolute', top: 0, height: '100%', width: '200%', display: 'flex', [dir === 'right' ? 'right' : 'left']: 0 }}>
                  {renderSpread(prevSpread)}
                </div>
              </div>
              <div className={`flip-face ${dir === 'right' ? 'back-fwd' : 'back-back'}`} style={{ overflow: 'hidden' }}>
                <div style={{ position: 'absolute', top: 0, height: '100%', width: '200%', display: 'flex', [dir === 'right' ? 'left' : 'right']: 0 }}>
                  {renderSpread(spread)}
                </div>
              </div>
            </div>
          }
        </div>
      </div>

      {/* Nav */}
      <div className="nav-bar">
        <button className="nav-btn" onClick={() => navigate(-1)} disabled={spread === 0 || transitioning}>‹</button>
        <div className="page-indicator">
          {spread === 0 ? '✦ Portada ✦' : `${spread} / ${totalSpreads - 1}`}
        </div>
        <button className="nav-btn" onClick={() => navigate(1)} disabled={spread >= totalSpreads - 1 || transitioning}>›</button>
        <button className="upload-btn" onClick={openBulk}>
          <span>📷</span> Subir fotos
        </button>
      </div>

      {/* Hidden message overlay */}
      {msgSlot !== null &&
      <HiddenMessageOverlay
        photoIndex={msgSlot}
        message={secrets[msgSlot] || ''}
        onSave={(txt) => setSecrets((s) => ({ ...s, [msgSlot]: txt }))}
        onClose={() => setMsgSlot(null)} />

      }

      {/* Tweaks */}
      <div className={`tweaks-panel${tweaksOpen ? ' open' : ''}`}>
        <div className="tweaks-title">✦ Tweaks</div>
        <div className="tweak-row">
          <div className="tweak-lbl">Título</div>
          <input className="tweak-inp" value={title} onChange={(e) => setTitle(e.target.value)} />
        </div>
        <div className="tweak-row">
          <div className="tweak-lbl">Nombres</div>
          <input className="tweak-inp" value={names} onChange={(e) => setNames(e.target.value)} />
        </div>
        <div className="tweak-row">
          <div className="tweak-lbl">Fecha especial (portada)</div>
          <input className="tweak-inp" value={date} onChange={(e) => setDate(e.target.value)} />
        </div>
        <div className="tweak-row">
          <div className="tweak-lbl">Inicio relación (YYYY-MM-DD)</div>
          <input className="tweak-inp" value={startD} onChange={(e) => setStartD(e.target.value)} placeholder="2024-02-14" />
        </div>
        <div className="tweak-row">
          <div className="tweak-lbl">Páginas</div>
          <div className="tweak-btn-row">
            <button className="tweak-btn remove" onClick={() => {if (photos.length > 2) {setPhotos((p) => p.slice(0, -2));setCaptions((c) => c.slice(0, -2));}}}>− Quitar</button>
            <button className="tweak-btn add" onClick={addPageSlots}>+ Añadir</button>
          </div>
        </div>
      </div>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<Album />);
</script>
<style>
  @keyframes floatY0 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes floatY1 { 0%,100%{transform:translateY(-4px)} 50%{transform:translateY(4px)} }
</style>
